<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Hyerin Seok</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat|Open+Sans|Comfortaa|M+PLUS+Rounded+1c&display=swap');

        * {box-sizing: border-box;}

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            perspective: 1px;
            transform-style: preserve-3d;
            height: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            font-family: 'Comfortaa';
        }

        h1 {
            font-size: 250%;
            font-family: 'Montserrat';
        }

        p {
            font-size: 140%;
            line-height: 150%;
            color: #333;
        }

        .header {
            overflow: hidden;
            text-shadow: 0 2px 2px #000;
        }

        .header a {
            float: left;
            text-align: center;
            padding: 12px;
            font-size: 18px; 
            line-height: 25px;
            border-radius: 4px;
        }

        .header-right {
            float: right;
        }

        @media screen and (max-width: 500px) {
            .header a {
                float: none;
                display: block;
                text-align: left;
            }
            
            .header-right {
                float: none;
            }
        }

    </style>
    <meta name="theme-color" content="#fafafa">
</head>

<body>
    <header>

        <a href="/" class="logo"><h1>Hyerin Seok</h1></a>
        <div class="header-right">
            <a href="/">About me</a>
            <a href="resume.html">Resume</a>
        </div>
    </header>


</body>

</html>
